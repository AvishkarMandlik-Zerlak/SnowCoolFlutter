spring.application.name=snowCool

server.port=8081
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/snowcool
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
#spring.jpa.properties.hibernate.format_sql=true

# OpenAI configuration
# Do NOT commit your API key. Prefer setting the environment variable OPENAI_API_KEY.
# The application will read openai.api.key from this property (falls back to empty if not set).
openai.api.key=${OPENAI_API_KEY:}

# Directory to store uploaded profile logos (relative to working dir)
profile.logo.upload-dir=${PROFILE_LOGO_UPLOAD_DIR:uploads}

jwt.secret=4f8e2b7c9d1a6e3f5b8c2d4a7e9f0b1c

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# DevTools (auto restart on classpath changes)
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=1000
spring.devtools.restart.quiet-period=400
spring.devtools.restart.additional-paths=src/main/java,src/main/resources
spring.devtools.restart.trigger-file=.reload

# Disable template cache in dev for hot reload (if templates used)
spring.thymeleaf.cache=false

# Seed a default admin user on startup (created only if username does not exist)
app.admin.username=admin
app.admin.password=admin
app.admin.role=ADMIN
