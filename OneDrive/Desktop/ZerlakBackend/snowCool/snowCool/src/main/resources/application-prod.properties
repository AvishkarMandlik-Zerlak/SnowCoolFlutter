
# ===============================
# ?? APPLICATION CONFIGURATION
# ===============================
spring.application.name=snowCool
server.port=8081

# Force UTF-8 encoding for all requests/responses
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===============================
# ??? DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/snowcool?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=snowcool
spring.datasource.password=SnowCool#2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ? HikariCP Connection Pool (optimized for production)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SnowCoolHikariPool

# ===============================
# ?? JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# ?? SECURITY / JWT CONFIGURATION
# ===============================
jwt.secret=4f8e2b7c9d1a6e3f5b8c2d4a7e9f0b1c
jwt.expiration=86400000  # 24 hours (in milliseconds)

# ===============================
# ?? FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
profile.logo.upload-dir=/root/snowcool/uploads

# ===============================
# ?? OPENAI API CONFIGURATION (OPTIONAL)
# ===============================
openai.api.key=${OPENAI_API_KEY:}
# (Set OPENAI_API_KEY as environment variable in VPS using `export OPENAI_API_KEY=sk-xxxx`)

# ===============================
# ?? LOGGING CONFIGURATION
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.snowCool=DEBUG

# Log file output
logging.file.name=/root/snowcool/snowcool.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# ? SERVER CONFIGURATION
# ===============================
server.tomcat.threads.max=200
server.tomcat.connection-timeout=20000
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ===============================
# ?? MISC PRODUCTION SETTINGS
# ===============================
spring.main.banner-mode=off
spring.devtools.restart.enabled=false
spring.thymeleaf.cache=true
